<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Family Dashboard</title>
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="title">Family Dashboard</div>
      <div class="header-right">
        <div id="current-date" class="date"></div>
        <div class="overflow-menu-wrap">
          <button id="overflow-btn" class="overflow-btn" type="button">&#8942;</button>
          <div id="overflow-menu" class="overflow-menu" style="display:none;">
            <button id="delete-checked-btn" class="overflow-item danger" type="button">Delete checked items</button>
          </div>
        </div>
      </div>
    </header>

    <nav class="tabs">
      <button id="tab-todos" class="tab active" type="button">To Do List</button>
      <button id="tab-chores" class="tab" type="button">Chores</button>
    </nav>

    <main>
      <section id="view-chores" class="view">
        <div class="section-head">
          <div class="section-title">Chores</div>
          <div class="section-sub">Daily + weekly lists</div>
        </div>
        <div id="chores-list" class="list"></div>
        <div class="add-row">
          <input id="chore-input" type="text" placeholder="Add a chore" />
          <select id="chore-frequency">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
          </select>
          <button id="chore-add" class="primary" type="button">Add</button>
        </div>
      </section>

      <section id="view-todos" class="view active">
        <div class="section-head">
          <div class="section-title">To Do List</div>
          <div class="section-sub">Organize by category</div>
        </div>
        <div id="todos-list" class="list"></div>
        <div class="add-row">
          <input id="todo-input" type="text" placeholder="Add a todo" />
          <select id="todo-category">
            <option>Home</option>
            <option>Shopping</option>
            <option>Projects</option>
            <option>Rob</option>
            <option>Other</option>
          </select>
          <button id="todo-add" class="primary" type="button">Add</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
