<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dashboard" />
  <link rel="apple-touch-icon" href="icon.png" />
  <title>Family Dashboard</title>
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>
  <div class="app">
    <nav class="sidebar">
      <button id="tab-todos" class="sidebar-item active" type="button">
        <span class="sidebar-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"></circle>
            <path d="M8.5 12.5l2.5 2.5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </span>
        <span class="sidebar-label">To Do</span>
      </button>
      <button id="tab-chores" class="sidebar-item" type="button">
        <span class="sidebar-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 7h4M7 7V3m0 4a7 7 0 0 1 11.3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M17 17h-4m4 0v4m0-4a7 7 0 0 1-11.3-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </span>
        <span class="sidebar-label">Chores</span>
      </button>
    </nav>

    <div class="content">
      <header class="top">
        <div class="title">Family Dashboard</div>
        <div class="header-right">
          <div id="current-date" class="date"></div>
          <div class="overflow-menu-wrap">
            <button id="overflow-btn" class="overflow-btn" type="button">&#8942;</button>
            <div id="overflow-menu" class="overflow-menu" style="display:none;">
              <button id="delete-checked-btn" class="overflow-item danger" type="button">Delete checked items</button>
            </div>
          </div>
        </div>
      </header>

      <main class="main-content">
      <section id="view-chores" class="view">
        <div class="section-head">
          <div class="section-title">Chores</div>
          <div class="section-sub">Daily + weekly lists</div>
        </div>
        <div id="chores-list" class="list"></div>
        <div class="add-row">
          <input id="chore-input" type="text" placeholder="Add a chore" />
          <select id="chore-frequency">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
          </select>
          <button id="chore-add" class="primary" type="button">Add</button>
        </div>
      </section>

      <section id="view-todos" class="view active">
        <div class="section-head">
          <div class="section-title">To Do List</div>
          <div class="section-sub">Organize by category</div>
        </div>
        <div id="todos-list" class="list"></div>
        <div class="add-row">
          <input id="todo-input" type="text" placeholder="Add a todo" />
          <select id="todo-category">
            <option>Home</option>
            <option>Shopping</option>
            <option>Projects</option>
            <option>Rob</option>
            <option>Other</option>
          </select>
          <button id="todo-add" class="primary" type="button">Add</button>
        </div>
      </section>
      </main>
    </div>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
