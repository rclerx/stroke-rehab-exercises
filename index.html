<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Exercises">
  <title>Daily Exercises</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <h1 class="app-title">Daily Exercises</h1>
        <div id="current-date" class="current-date"></div>
      </div>
      <div class="progress-section">
        <div class="progress-track">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="progress-text" class="progress-text">0 / 0 done</div>
      </div>
    </header>

    <main class="content">
      <div id="exercise-list" class="exercise-list"></div>

      <div class="add-row">
        <input type="text" id="exercise-input" class="add-input" placeholder="Add new exercise...">
        <select id="exercise-category" class="add-select">
          <option value="hand-arm">Hand &amp; Arm</option>
          <option value="leg-balance">Leg &amp; Balance</option>
          <option value="speech-cognitive">Speech &amp; Cognitive</option>
          <option value="daily-movement">Daily Movement</option>
        </select>
        <button id="exercise-add" class="add-btn">Add</button>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
